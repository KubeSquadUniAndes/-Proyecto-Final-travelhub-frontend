<div class="checkout-page">
  <header>
    <div class="header-content">
      <a class="logo" (click)="navigate('/home')"><div class="logo-icon">TH</div><span>TravelHub</span></a>
      <nav>
        <a (click)="navigate('/home')">Home</a>
        <a (click)="navigate('/search')">Hotels</a>
        <a (click)="navigate('/dashboard')">Dashboard</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="breadcrumb">
      <a (click)="navigate('/home')">Home</a><span>/</span>
      <a (click)="navigate('/search')">Hoteles</a><span>/</span>
      <a>Grand Seaside Resort</a><span>/</span>
      <span class="current">Checkout</span>
    </div>

    <h1>Completar reserva</h1>

    <div class="checkout-content">
      <form class="checkout-form">
        <h2>Datos personales</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Nombre *</label>
            <input type="text" placeholder="Juan" [(ngModel)]="nombre" name="nombre" />
          </div>
          <div class="form-group">
            <label>Apellido *</label>
            <input type="text" placeholder="Pérez" [(ngModel)]="apellido" name="apellido" />
          </div>
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" placeholder="juan.perez&#64;email.com" [(ngModel)]="email" name="email" />
        </div>
        <div class="form-group">
          <label>Teléfono *</label>
          <input type="tel" placeholder="+57 300 123 4567" [(ngModel)]="telefono" name="telefono" />
        </div>
        <div class="form-group">
          <label>Dirección</label>
          <input type="text" placeholder="Calle 123 #45-67" [(ngModel)]="direccion" name="direccion" />
        </div>
        <button type="button" class="btn-next" (click)="goToStep2()">Siguiente</button>
      </form>
    </div>
  </div>
</div>
