<div class="confirmed-container">
  <header>
    <div class="logo">TravelHub</div>
  </header>
  
  <main>
    <div class="success-icon">✓</div>
    <h1>¡Reserva Confirmada!</h1>
    <p>Tu reserva ha sido procesada exitosamente</p>
    
    <div class="actions">
      <button class="primary" (click)="goToDashboard()">Ver Dashboard</button>
      <button class="secondary" (click)="printBooking()">Imprimir Reserva</button>
      <button class="secondary" (click)="goToHome()">Volver al Inicio</button>
    </div>
  </main>
</div>
