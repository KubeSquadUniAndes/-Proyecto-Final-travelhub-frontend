<div class="search-container">
  <header>
    <div class="logo">TravelHub</div>
    <button (click)="goBack()">Volver</button>
  </header>

  <main>
    <h1>Buscar Hoteles</h1>

    <div class="hotels-list">
      @for (hotel of hotels; track hotel) {
        <div class="hotel-card">
          <h3>{{ hotel.name }}</h3>
          <p>Precio: ${{ hotel.price }} / noche</p>
          <p>Rating: {{ hotel.rating }} ⭐</p>
          <button (click)="goToCheckout(hotel.id)">Reservar</button>
        </div>
      }
    </div>
  </main>
</div>
