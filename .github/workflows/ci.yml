name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: travelhub-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: travelhub-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx ng lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: travelhub-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx ng test --watch=false --coverage

      - name: Check coverage threshold
        run: |
          LINES=$(node -e "const c=require('./coverage/travelhub-app/coverage-final.json'); const files=Object.values(c); const s=files.reduce((a,f)=>({s:a.s+Object.values(f.s).filter(Boolean).length,t:a.t+Object.values(f.s).length}),{s:0,t:0}); console.log(Math.round(s.s/s.t*100))")
          echo "Line coverage: $LINES%"
          if [ "$LINES" -lt 70 ]; then echo "Coverage $LINES% is below 70% threshold" && exit 1; fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: travelhub-app/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: travelhub-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npx ng build --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: travelhub-app/dist/

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: travelhub-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high --omit=dev
